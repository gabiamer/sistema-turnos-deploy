services:

  db:
    image: postgres:16-alpine
    container_name: turnos-db
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - turnos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../sistema-turnos-back
      dockerfile: Dockerfile
    container_name: turnos-backend
    environment:
      DB_URL:               jdbc:postgresql://db:5432/${DB_NAME}
      DB_USERNAME:          ${DB_USER}
      DB_PASSWORD:          ${DB_PASSWORD}
      MAIL_USERNAME:        ${MAIL_USERNAME}
      MAIL_PASSWORD:        ${MAIL_PASSWORD}
      TWILIO_ACCOUNT_SID:   ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN:    ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE:         ${TWILIO_PHONE}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - turnos-net

  frontend:
    build:
      context: ../sistema-turnos-front
      dockerfile: Dockerfile
    container_name: turnos-frontend
    environment:
      BACKEND_URL: http://backend:8090
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - turnos-net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: turnos-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - turnos-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: turnos-grafana
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - turnos-net

networks:
  turnos-net:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
